# Scheduler for the PPP TV auto-newsroom (ppptv.online).
# Fires the trigger EVERY HOUR, but sleeps a random 0-18 minutes first so
# posts never land at a fixed minute - organic-looking timing keeps Meta's
# spam heuristics happy. Daily IndexNow ping keeps search engines fresh.
name: auto-newsroom

on:
  schedule:
    - cron: "3 * * * *"
  workflow_dispatch: {}

concurrency:
  group: auto-newsroom
  cancel-in-progress: false

env:
  SITE: https://ppp-tv-site-final.vercel.app

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Random jitter (0-18 min) so posting time is never predictable
        run: |
          J=$((RANDOM % 1080))
          echo "sleeping ${J}s"
          sleep $J
      - name: Trigger auto-post
        run: |
          curl -fsS --max-time 280 -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" "$SITE/api/cron/auto-post" | tee result.json
          echo
          if grep -q '"configured":false' result.json; then
            echo "::warning::Meta Graph API tokens not configured yet - see docs/SETUP-META.md in ppp-tv-site-"
          fi

  index-ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Daily IndexNow ping (midnight UTC run only)
        run: |
          hour=$(date -u +%H)
          if [ "$hour" = "00" ]; then
            curl -fsS --max-time 60 "$SITE/api/cron/ping-search-engines" || true
          else
            echo "Skipping - runs once daily at 00:xx UTC"
          fi
